<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local AI Chat — Ollama</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #e8e8e6;
    --muted: #888;
    --accent: #7f77dd;
    --accent-bg: rgba(127,119,221,0.12);
    --user-bg: #2a2a3a;
    --font: 'Georgia', serif;
    --mono: 'Menlo', 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff; font-family: var(--mono); font-weight: bold;
  }

  .header-info h1 {
    font-size: 15px; font-weight: normal; letter-spacing: 0.02em;
    color: var(--text);
  }

  .status {
    font-size: 12px;
    font-family: var(--mono);
    display: flex; align-items: center; gap: 6px;
    color: var(--muted);
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }
  .dot.online { background: #5dc8a5; }
  .dot.error  { background: #e24b4a; }

  .model-select {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }
  .model-select:focus { border-color: var(--accent); }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    max-width: 780px;
    margin: 0 auto 20px;
    padding: 0 24px;
    animation: fadein 0.2s ease;
  }

  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .message .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .message .bubble {
    line-height: 1.75;
    font-size: 15px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .meta { color: var(--accent); }
  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(127,119,221,0.2);
    padding: 12px 16px;
    border-radius: 12px 12px 4px 12px;
    display: inline-block;
    max-width: 100%;
  }

  .message.assistant .bubble {
    color: var(--text);
  }

  .message.assistant .bubble code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 3px;
    color: #a8d8a8;
  }

  .message.assistant .bubble pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 12px 0;
  }

  .message.assistant .bubble pre code {
    background: none;
    padding: 0;
    color: #a8d8a8;
  }

  .thinking {
    display: flex; gap: 5px; align-items: center;
    padding: 4px 0;
  }
  .thinking span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.5;
    animation: pulse 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  #empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--muted);
    font-size: 14px;
    font-family: var(--mono);
    text-align: center;
  }
  #empty .big { font-size: 36px; }
  #empty p { line-height: 1.8; }

  footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    padding: 11px 14px;
    border-radius: 10px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 180px;
    overflow-y: auto;
    transition: border-color 0.2s;
  }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--muted); }

  #send {
    background: var(--accent);
    border: none;
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }
  #send:hover { opacity: 0.85; }
  #send:active { transform: scale(0.95); }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }

  #send svg { width: 16px; height: 16px; }

  .hint {
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    max-width: 780px;
    margin-left: auto;
    margin-right: auto;
  }

  .error-bar {
    background: rgba(226,75,74,0.15);
    border: 1px solid rgba(226,75,74,0.3);
    color: #f09595;
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
    max-width: 780px;
    margin-left: auto;
    margin-right: auto;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">AI</div>
  <div class="header-info">
    <h1>Local AI Chat</h1>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
  </div>
  <select class="model-select" id="model-select">
    <option value="llama3.2">llama3.2</option>
    <option value="llama3">llama3</option>
    <option value="mistral">mistral</option>
    <option value="gemma3">gemma3</option>
    <option value="phi3">phi3</option>
  </select>
</header>

<div id="chat">
  <div id="empty">
    <div class="big">◎</div>
    <p>Your local Llama 3 is ready.<br>Everything stays on your machine.</p>
  </div>
</div>

<footer>
  <div class="error-bar" id="error-bar"></div>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Send a message…" autofocus></textarea>
    <button id="send">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="14" x2="8" y2="2"/>
        <polyline points="3,7 8,2 13,7"/>
      </svg>
    </button>
  </div>
  <p class="hint">Enter to send · Shift+Enter for new line · Runs 100% locally via Ollama</p>
</footer>

<script>
const OLLAMA_URL = 'http://localhost:11434';

const chatEl = document.getElementById('chat');
const emptyEl = document.getElementById('empty');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const dotEl = document.getElementById('dot');
const statusEl = document.getElementById('status-text');
const errorBar = document.getElementById('error-bar');
const modelSelect = document.getElementById('model-select');

let history = [];
let busy = false;

async function checkOllama() {
  try {
    const r = await fetch(`${OLLAMA_URL}/api/tags`);
    if (r.ok) {
      const data = await r.json();
      dotEl.className = 'dot online';
      statusEl.textContent = 'Connected · ' + (data.models?.length || 0) + ' models';
      if (data.models?.length) {
        const names = data.models.map(m => m.name.split(':')[0]);
        const opts = modelSelect.querySelectorAll('option');
        opts.forEach(o => { o.selected = names.includes(o.value) && o.value === 'llama3.2'; });
        if (!names.includes('llama3.2') && names.length) {
          modelSelect.value = data.models[0].name.split(':')[0];
        }
      }
    }
  } catch {
    dotEl.className = 'dot error';
    statusEl.textContent = 'Ollama not found — run: ollama serve';
  }
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
}

inputEl.addEventListener('input', autoResize);

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!busy) sendMessage();
  }
});

sendBtn.addEventListener('click', () => { if (!busy) sendMessage(); });

function showError(msg) {
  errorBar.textContent = msg;
  errorBar.style.display = 'block';
  setTimeout(() => { errorBar.style.display = 'none'; }, 5000);
}

function addMessage(role, content) {
  if (emptyEl) emptyEl.style.display = 'none';
  const el = document.createElement('div');
  el.className = `message ${role}`;
  const meta = role === 'user' ? 'You' : modelSelect.value;
  el.innerHTML = `<div class="meta">${meta}</div><div class="bubble"></div>`;
  chatEl.appendChild(el);
  if (content) el.querySelector('.bubble').textContent = content;
  chatEl.scrollTop = chatEl.scrollHeight;
  return el.querySelector('.bubble');
}

function addThinking() {
  if (emptyEl) emptyEl.style.display = 'none';
  const el = document.createElement('div');
  el.className = 'message assistant';
  el.id = 'thinking-msg';
  el.innerHTML = `<div class="meta">${modelSelect.value}</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(el);
  chatEl.scrollTop = chatEl.scrollHeight;
  return el;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMessage('user', text);
  history.push({ role: 'user', content: text });

  busy = true;
  sendBtn.disabled = true;

  const thinkingEl = addThinking();

  try {
    const response = await fetch(`${OLLAMA_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelSelect.value,
        messages: history,
        stream: true
      })
    });

    if (!response.ok) {
      throw new Error(`Ollama error: ${response.status} ${response.statusText}`);
    }

    thinkingEl.remove();
    const bubble = addMessage('assistant', '');
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n').filter(l => l.trim());
      for (const line of lines) {
        try {
          const data = JSON.parse(line);
          if (data.message?.content) {
            full += data.message.content;
            bubble.textContent = full;
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        } catch {}
      }
    }

    history.push({ role: 'assistant', content: full });

  } catch (err) {
    thinkingEl.remove();
    showError(err.message.includes('fetch') ?
      'Cannot reach Ollama. Make sure it is running: OLLAMA_ORIGINS=* ollama serve' :
      err.message);
  }

  busy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

checkOllama();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S Local Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Corner decorations -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Speaking indicator -->
  <div id="speaking-bar">
    <div class="speak-bars">
      <div class="speak-bar"></div>
      <div class="speak-bar"></div>
      <div class="speak-bar"></div>
      <div class="speak-bar"></div>
      <div class="speak-bar"></div>
    </div>
    SPEAKING
  </div>

  <!-- Live transcript while listening -->
  <div id="transcript-live">🎙 Listening…</div>

  <header>
    <div class="logo-ring">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring1" cx="20" cy="20" r="17" stroke="rgba(0,200,255,0.4)" stroke-width="1" stroke-dasharray="4 3"/>
        <circle class="ring2" cx="20" cy="20" r="12" stroke="rgba(0,150,255,0.5)" stroke-width="1" stroke-dasharray="2 4"/>
        <circle cx="20" cy="20" r="6" fill="rgba(0,200,255,0.15)" stroke="rgba(0,200,255,0.7)" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="2.5" fill="var(--accent)"/>
      </svg>
    </div>

    <div class="header-info">
      <h1>J.A.R.V.I.S LOCAL</h1>
      <div class="status">
        <span class="dot" id="dot"></span>
        <span id="status-text">INITIALIZING…</span>
      </div>
    </div>

    <label class="tts-toggle" title="Text-to-speech">
      <input type="checkbox" id="tts-toggle" checked />
      <span class="tts-pill"></span>
      TTS
    </label>

    <select class="model-select" id="model-select">
      <option value="llama3.2">llama3.2</option>
      <option value="llama3">llama3</option>
      <option value="mistral">mistral</option>
      <option value="gemma3">gemma3</option>
      <option value="phi3">phi3</option>
    </select>
  </header>

  <div id="chat">
    <div id="empty">
      <div class="jarvis-ring">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring1" cx="50" cy="50" r="45" stroke="rgba(0,200,255,0.3)" stroke-width="1.5" stroke-dasharray="6 4"/>
          <circle class="ring2" cx="50" cy="50" r="35" stroke="rgba(0,150,255,0.4)" stroke-width="1" stroke-dasharray="3 5"/>
          <circle class="ring3" cx="50" cy="50" r="22" stroke="rgba(0,200,255,0.5)" stroke-width="1" stroke-dasharray="2 3"/>
          <circle cx="50" cy="50" r="12" fill="rgba(0,200,255,0.1)" stroke="rgba(0,200,255,0.6)" stroke-width="1.5"/>
          <circle cx="50" cy="50" r="5" fill="var(--accent)" opacity="0.9"/>
        </svg>
        <div class="jarvis-core">AI</div>
      </div>
      <div class="tagline">JARVIS LOCAL AGENT</div>
      <p>
        Click the mic or press <span class="key-hint">SPACE</span> to speak.<br />
        Type to send a message manually.<br />
        All processing stays on your machine.
      </p>
    </div>
  </div>

  <footer>
    <div class="error-bar" id="error-bar"></div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Type a command or press mic to speak…" autofocus></textarea>

      <button class="btn-voice" id="voice-btn" title="Click to speak (or press Space)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>

      <button id="send">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="14" x2="8" y2="2"/>
          <polyline points="3,7 8,2 13,7"/>
        </svg>
      </button>
    </div>
    <p class="hint">
      <span class="key">ENTER</span> send &nbsp;·&nbsp;
      <span class="key">SHIFT+ENTER</span> new line &nbsp;·&nbsp;
      <span class="key">SPACE</span> toggle mic &nbsp;·&nbsp;
      Runs 100% locally via Ollama
    </p>
  </footer>

  <script src="chat.js"></script>
  <script src="voice.js"></script>
  <script src="app.js"></script>
</body>
</html>
